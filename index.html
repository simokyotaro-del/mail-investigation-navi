<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>メール調査ナビ</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 画面1 -->
<div id="screen1" class="screen active">
 <h1>メール調査ナビ</h1>

<p>スクショから調査を開始します</p>

<input type="file" id="imageInput" accept="image/*">

<img
  id="preview"
  style="
    max-width:300px;
    display:none;
    margin-top:20px;
  "
>

<br><br>

<button onclick="nextFlow()">
解析開始
</button>
</div>

<!-- 画面2 -->
<div id="screen2" class="screen">
  <h1>解析中...</h1>
</div>

<!-- 画面3 -->
<div id="screen3" class="screen">

  <h1>メールアプリ判定</h1>

  <p id="appResult">
    判定中...
  </p>

  <button onclick="showScreen('screen4')">
    続行
  </button>

</div>

<!-- 画面4 -->
<div id="screen4" class="screen">

  <h1>ヘッダー入力</h1>

  <p>ヘッダーを貼り付けてください</p>

  <p>
    ヘッダーの取得方法が分からない場合は
    下の案内を確認してください。
  </p>

  <button onclick="showScreen('screenGuide')">
    ヘッダー取得方法を見る
  </button>

  <textarea id="headerInput"></textarea>

  <br>

  <button onclick="analyzeHeader()">
    解析する
  </button>

</div>

<!-- ヘッダー取得ガイド -->
<div id="screenGuide" class="screen">

  <h1>ヘッダー取得方法</h1>

  <h2>Gmail</h2>

  <p>
    メールを開く<br>
    ↓<br>
    右上の「︙」<br>
    ↓<br>
    「メッセージのソースを表示」<br>
    ↓<br>
    全文コピー
  </p>

  <h2>Outlook</h2>

  <p>
    メールを開く<br>
    ↓<br>
    その他操作<br>
    ↓<br>
    メッセージのソース表示
  </p>

  <button onclick="showScreen('screen4')">
    戻る
  </button>

</div>

<!-- 画面5 -->
<div id="screen5" class="screen">

  <div id="result" class="result"></div>

  <button onclick="showScreen('screen1')">
    最初に戻る
  </button>

</div>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<script src="js/ocr.js"></script>
<script src="js/appDetector.js"></script>
<script src="js/dangerWordDetector.js"></script>
<script src="js/urlDetector.js"></script> 
<script src="js/riskScorer.js"></script> 

<script src="navigation.js"></script>
<script src="headerAnalyzer.js"></script>

</body>
</html>
