<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>メール調査ナビ</title>

<style>
  body { font-family: sans-serif; text-align:center; padding:30px; }
  .screen { display:none; }
  .active { display:block; }

  button {
    font-size:18px;
    padding:12px 20px;
    margin:10px;
    cursor:pointer;
  }

  textarea {
    width:90%;
    height:200px;
  }

  .result {
    text-align:left;
    width:90%;
    margin:0 auto;
    white-space:pre-wrap;
  }
</style>
</head>

<body>

<!-- 画面1 -->
<div id="screen1" class="screen active">
  <h1>メール調査ナビ</h1>
  <p>スクショから調査を開始します</p>

  <button onclick="nextFlow()">📷 スクショを選ぶ</button>
</div>

<!-- 画面2 -->
<div id="screen2" class="screen">
  <h1>解析中...</h1>
  <p>メールを確認しています</p>
</div>

<!-- 画面3 -->
<div id="screen3" class="screen">
  <h1>アプリ判定</h1>
  <p>Gmailですか？</p>

  <button onclick="showScreen('screen4')">はい</button>
  <button onclick="showScreen('screen4')">いいえ</button>
</div>

<!-- 画面4 -->
<div id="screen4" class="screen">
  <h1>ヘッダー入力</h1>

  <p>ヘッダーを貼り付けてください</p>

  <textarea id="headerInput"></textarea>

  <br>

  <button onclick="analyzeHeader()">解析する</button>
</div>

<!-- 画面5 -->
<div id="screen5" class="screen">
  <h1>解析結果</h1>

  <div id="result" class="result"></div>

  <button onclick="showScreen('screen1')">最初に戻る</button>
</div>

<script>

/* 画面切替 */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

/* フロー */
function nextFlow(){
  showScreen('screen2');

  setTimeout(()=>{
    showScreen('screen3');
  }, 1500);
}

/* ★重要：強化パーサー */
function analyzeHeader(){

  const text = document.getElementById("headerInput").value.toLowerCase();

  let issues = [];

  let explanation = [];

  /* SPF */
  const spfPass = /spf\s*=\s*pass/.test(text);
  const spfFail = /spf\s*=\s*fail/.test(text);

  if (spfFail) {
    issues.push("SPF_FAIL");
  } else if (!spfPass) {
    issues.push("SPF_UNKNOWN");
  }

  /* DKIM */
  const dkimPass = /dkim\s*=\s*pass/.test(text);
  const dkimNone = /dkim\s*=\s*none/.test(text);

  if (dkimNone) {
    issues.push("DKIM_NONE");
  } else if (!dkimPass) {
    issues.push("DKIM_UNKNOWN");
  }

  /* DMARC */
  const dmarcPass = /dmarc\s*=\s*pass/.test(text);
  const dmarcFail = /dmarc\s*=\s*fail/.test(text);

  if (dmarcFail) {
    issues.push("DMARC_FAIL");
  } else if (!dmarcPass) {
    issues.push("DMARC_UNKNOWN");
  }

  /* Reply-To */
  const from = text.match(/from:.*@([a-z0-9.\-]+)/);
  const reply = text.match(/reply-to:.*@([a-z0-9.\-]+)/);

  if (from && reply && from[1] !== reply[1]) {
    issues.push("REPLY_MISMATCH");
  }

  /* IP系 */
  if (text.includes("unknown") || text.includes("185.") || text.includes("ru")) {
    issues.push("SUSPICIOUS_SOURCE");
  }

  /* 日本語変換 */
  let resultText = [];

  if (issues.includes("SPF_FAIL")) {
    resultText.push("・送信元が正規のサーバーではない可能性があります（SPF失敗）");
  }

  if (issues.includes("SPF_UNKNOWN")) {
    resultText.push("・送信元の正当性が確認できません（SPF情報なし）");
  }

  if (issues.includes("DKIM_NONE")) {
    resultText.push("・メールの改ざん検証ができません（DKIMなし）");
  }

  if (issues.includes("DKIM_UNKNOWN")) {
    resultText.push("・メールの改ざん確認情報が不足しています（DKIM不明）");
  }

  if (issues.includes("DMARC_FAIL")) {
    resultText.push("・なりすまし対策に失敗している可能性があります（DMARC失敗）");
  }

  if (issues.includes("DMARC_UNKNOWN")) {
    resultText.push("・なりすまし対策情報が確認できません（DMARCなし）");
  }

  if (issues.includes("REPLY_MISMATCH")) {
    resultText.push("・返信先が送信元と一致していません（詐欺でよくある特徴）");
  }

  if (issues.includes("SUSPICIOUS_SOURCE")) {
    resultText.push("・送信元に不審な痕跡があります（IPまたはドメイン）");
  }

  if (resultText.length === 0) {
    resultText.push("大きな不審点は検出されませんでした。ただし完全な安全保証ではありません。");
  }

  document.getElementById("result").innerHTML =
    "<h2>解析結果</h2><br>" + resultText.join("<br>");

  showScreen("screen5");
}
</script>

</body>
</html>
