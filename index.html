<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>メール調査ナビ</title>

<style>
  body {
    font-family: sans-serif;
    text-align: center;
    padding: 30px;
  }

  .screen { display: none; }
  .active { display: block; }

  button {
    font-size: 18px;
    padding: 12px 20px;
    margin: 10px;
    cursor: pointer;
  }

  textarea {
    width: 90%;
    height: 200px;
  }

  .result {
    text-align: left;
    width: 90%;
    margin: 0 auto;
    white-space: pre-wrap;
  }

  .badge {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
  }

  .safe { color: green; }
  .warn { color: orange; }
  .danger { color: red; }
</style>
</head>

<body>

<!-- 画面1 -->
<div id="screen1" class="screen active">
  <h1>メール調査ナビ</h1>
  <p>スクショから調査を開始します</p>

  <button onclick="nextFlow()">📷 スクショを選ぶ</button>
</div>

<!-- 画面2 -->
<div id="screen2" class="screen">
  <h1>解析中...</h1>
</div>

<!-- 画面3 -->
<div id="screen3" class="screen">
  <h1>アプリ判定</h1>
  <p>Gmailですか？</p>

  <button onclick="showScreen('screen4')">はい</button>
  <button onclick="showScreen('screen4')">いいえ</button>
</div>

<!-- 画面4 -->
<div id="screen4" class="screen">
  <h1>ヘッダー入力</h1>

  <p>ヘッダーを貼り付けてください</p>

<p>
  ヘッダーの取得方法が分からない場合は
  下の案内を確認してください。
</p>

<button onclick="showScreen('screenGuide')">
  ヘッダー取得方法を見る
</button>
  <textarea id="headerInput"></textarea>

  <br>

  <button onclick="analyzeHeader()">解析する</button>
</div>

<!-- ヘッダー取得ガイド -->
<div id="screenGuide" class="screen">

  <h1>ヘッダー取得方法</h1>

  <h2>Gmail</h2>

  <p>
    メールを開く<br>
    ↓<br>
    右上の「︙」<br>
    ↓<br>
    「メッセージのソースを表示」<br>
    ↓<br>
    全文コピー
  </p>

  <h2>Outlook</h2>

  <p>
    メールを開く<br>
    ↓<br>
    その他操作<br>
    ↓<br>
    メッセージのソース表示
  </p>

  <button onclick="showScreen('screen4')">
    戻る
  </button>

</div>

<!-- 画面5 -->
<div id="screen5" class="screen">

  <div id="result" class="result"></div>

  <button onclick="showScreen('screen1')">
    最初に戻る
  </button>

</div>
  
<script>

/* 画面切替 */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

/* フロー */
function nextFlow(){
  showScreen('screen2');

  setTimeout(()=>{
    showScreen('screen3');
  }, 1500);
}

/* ★メイン解析 */
function analyzeHeader(){

  const text = document.getElementById("headerInput").value.toLowerCase();

  let issues = [];
  let messages = [];
  let checks = [];
  let score = 0;

  /* 情報不足判定 */

  const headerIndicators = [
    "authentication-results",
    "received:",
    "return-path:",
    "message-id:"
];

let foundIndicators = 0;

headerIndicators.forEach(item => {
  if (text.includes(item)) {
    foundIndicators++;
  }
});

  /* SPF */
  const spfPass = /spf\s*=\s*pass/.test(text);
  const spfFail = /spf\s*=\s*fail/.test(text);

  if (spfFail) {

  issues.push("spf_fail");
  score += 40;

  checks.push("送信元確認：❌ 失敗");

} else if (!spfPass) {

  issues.push("spf_unknown");
  score += 20;

  checks.push("送信元確認：⚠ 情報不足");

} else {

  checks.push("送信元確認：✅ 正常");
}
    

  /* ドメイン不一致検出 */

const fromMatch = text.match(/from:.*@([a-z0-9.\-]+)/);

if (fromMatch) {

  const senderDomain = fromMatch[1];

  const suspiciousKeywords = [
    "amazon",
    "paypal",
    "apple",
    "microsoft",
    "rakuten",
    "yahoo",
    "google"
  ];

  suspiciousKeywords.forEach(keyword => {

    if (
      senderDomain.includes(keyword) &&
      !senderDomain.endsWith(keyword + ".com") &&
      !senderDomain.endsWith(keyword + ".co.jp") &&
      !senderDomain.endsWith(keyword + ".jp")
    ) {

      issues.push("brand_domain_mismatch");
      score += 30;

    }

  });

}

  /* DKIM */
  const dkimPass = /dkim\s*=\s*pass/.test(text);
  const dkimNone = /dkim\s*=\s*none/.test(text);

  if (dkimNone) {

  issues.push("dkim_none");
  score += 20;

  checks.push("改ざんチェック：⚠ 情報不足");

} else if (!dkimPass) {

  issues.push("dkim_unknown");
  score += 20;

  checks.push("改ざんチェック：⚠ 情報不足");

} else {

  checks.push("改ざんチェック：✅ 正常");

}

  /* DMARC */
  const dmarcPass = /dmarc\s*=\s*pass/.test(text);
  const dmarcFail = /dmarc\s*=\s*fail/.test(text);

 if (dmarcFail) {

  issues.push("dmarc_fail");
  score += 30;

  checks.push("なりすまし対策：❌ 失敗");

} else if (!dmarcPass) {

  issues.push("dmarc_unknown");
  score += 15;

  checks.push("なりすまし対策：⚠ 情報不足");

} else {

  checks.push("なりすまし対策：✅ 正常");

}

  /* Reply-To */
  if (text.includes("reply-to")) {
    const from = text.match(/from:.*@([a-z0-9.\-]+)/);
    const reply = text.match(/reply-to:.*@([a-z0-9.\-]+)/);

    if (from && reply && from[1] !== reply[1]) {
      issues.push("reply_mismatch");
      score += 20;
    }
  }

  /* 不審ワード */
  if (text.includes("unknown") || text.includes("185.") || text.includes("ru")) {
    issues.push("suspicious_source");
    score += 30;
  }

  if (score > 100) score = 100;
  if (foundIndicators < 2) {
  issues.push("insufficient_data");
}

  /* ラベル判定 */
let label = "";
let labelClass = "";
let summary = "";
  
  if (issues.includes("insufficient_data")) {

  label = "情報不足";
  labelClass = "warn";

  summary =
    "この情報だけでは正確な判定ができません。完全なメールヘッダーを取得してください。";

} else if (score >= 70) {

  label = "危険";
  labelClass = "danger";

  summary =
    "このメールには複数の注意点が見つかりました。内容をよく確認してください。";

} else if (score >= 40) {

  label = "注意";
  labelClass = "warn";

  summary =
    "このメールには確認をおすすめする項目があります。";

} else {

  label = "低";
  labelClass = "safe";

  summary =
    "大きな不審点は検出されませんでした。ただし、この結果は安全性を保証するものではありません。";

}
  /* 説明文生成 */
  if (issues.includes("spf_fail")) {
    messages.push("・送信元が正規サーバーではない可能性（SPF失敗）");
  }
  if (issues.includes("spf_unknown")) {
    messages.push("・送信元の正当性が確認できません（SPFなし）");
  }
  if (issues.includes("dkim_none")) {
    messages.push("・メール改ざん検証ができません（DKIMなし）");
  }
  if (issues.includes("dkim_unknown")) {
    messages.push("・署名情報が不足しています（DKIM不明）");
  }
  if (issues.includes("dmarc_fail")) {
    messages.push("・なりすまし防止に失敗の可能性（DMARC失敗）");
  }
  if (issues.includes("dmarc_unknown")) {
    messages.push("・なりすまし対策情報が不足（DMARCなし）");
  }
  if (issues.includes("reply_mismatch")) {
    messages.push("・返信先が送信元と一致していません（詐欺の典型）");
  }
  if (issues.includes("suspicious_source")) {
    messages.push("・送信元に不審な痕跡があります（IP/ドメイン）");
  }
  if (issues.includes("brand_domain_mismatch")) {
  messages.push("・有名サービスを装ったドメインの可能性があります");
}
  if (issues.includes("insufficient_data")) {
  messages.push(
    "・判定に必要な情報が不足しています。完全なヘッダーを取得してください。"
  );
}

  if (messages.length === 0) {
    messages.push("明確な不審点は検出されませんでした。ただし完全な安全保証ではありません。");
  }

 /* 表示 */
document.getElementById("result").innerHTML = `
  <div class="badge ${labelClass}">
    危険度：${score} / 100（${label}）
  </div>

  <div style="
    border:1px solid #ccc;
    padding:15px;
    margin:15px 0;
    border-radius:8px;
  ">
    <strong>総評</strong>
    <br><br>
    ${summary}
  </div>

  <div>
    <strong>確認結果</strong>
<br><br>
${checks.join("<br>")}

<br><br>

<strong>詳細</strong>
<br><br>
${messages.join("<br>")}

showScreen('screen5');

}
</script>

</body>
</html>
