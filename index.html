<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>メール調査ナビ</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px;
    }

    .screen {
      display: none;
    }

    .active {
      display: block;
    }

    button {
      font-size: 20px;
      padding: 15px 30px;
      margin: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- 画面1 -->
  <div id="screen1" class="screen active">
    <h1>メール調査ナビ</h1>
    <p>怪しいメールかどうかを確認します</p>

    <button onclick="nextFlow()">
      📷 スクショを選ぶ
    </button>
  </div>

  <!-- 画面2 -->
  <div id="screen2" class="screen">
    <h1>解析中...</h1>
    <p>メールを確認しています</p>
  </div>

  <!-- 画面3 -->
  <div id="screen3" class="screen">
    <h1>メールアプリ判定</h1>
    <p>このメールはGmailですか？</p>

    <button onclick="goGuide()">はい</button>
    <button onclick="goGuide()">いいえ</button>
  </div>

  <!-- 画面4：ガイド選択 -->
<div id="screen4" class="screen">
  <h1>メールアプリを選択</h1>
  <p>あなたの環境を選んでください</p>

  <button onclick="showGuide('iphone')">Gmail（iPhone）</button>
  <button onclick="showGuide('android')">Gmail（Android）</button>
  <button onclick="showGuide('other')">その他</button>
</div>

  <!-- 画面5：iPhoneガイド -->
<div id="screen5" class="screen">
  <h1>Gmail（iPhone）手順</h1>

  <p>① Gmailアプリで対象メールを開く</p>
  <p>② 右上の「…」を押す</p>
  <p>③ 「元のメッセージを表示」を選択</p>
  <p>④ 表示された内容をすべてコピー</p>

  <button onclick="showScreen('screen6')">
    ヘッダーを貼り付ける
  </button>
</div>

  <!-- 画面6：ヘッダー入力 -->
<div id="screen6" class="screen">
  <h1>ヘッダー入力</h1>

  <p>コピーした内容を貼り付けてください</p>

  <textarea id="headerInput" style="width:90%; height:200px;"></textarea>

<br>

<button onclick="analyzeHeader()">
  解析する
</button>
</div>

  <!-- 画面7：結果 -->
<div id="screen7" class="screen">
  <div id="result"></div>

  <button onclick="showScreen('screen1')">
    最初に戻る
  </button>
</div>
  
  
  <script>
    // 安全に画面切替する関数（重要）
    function showScreen(id) {
      const screens = document.querySelectorAll(".screen");

      screens.forEach(s => {
        s.classList.remove("active");
      });

      const target = document.getElementById(id);
      if (target) {
        target.classList.add("active");
      }
    }

    // スタートフロー
    function nextFlow() {
      showScreen("screen2");

      setTimeout(() => {
        showScreen("screen3");
      }, 2000);
    }

    // ガイドへ
    function goGuide() {
      showScreen("screen4");
    }
  </script>

  <script>
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => {
    s.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

function nextFlow() {
  showScreen("screen2");

  setTimeout(() => {
    showScreen("screen4");
  }, 2000);
}

function showGuide(type) {
  if (type === "iphone") {
    showScreen("screen5");
  } else {
    alert("この環境はまだ準備中です（次ステップで対応）");
  }
}
</script>

  <script>
function analyzeHeader() {
  const text = document.getElementById("headerInput").value;

  let result = [];

  // 超シンプル判定（MVP）
  if (!text.includes("spf=pass") && !text.includes("spf")) {
    result.push("送信元認証（SPF）の情報が確認できません");
  }

  if (!text.includes("dkim=pass") && !text.includes("dkim")) {
    result.push("送信者の正当性（DKIM）が確認できません");
  }

  if (!text.includes("dmarc=pass") && !text.includes("dmarc")) {
    result.push("なりすまし防止（DMARC）が確認できません");
  }

  if (result.length === 0) {
    result.push("明確な不審点は見つかりませんでした");
  }

  document.getElementById("result").innerHTML =
    "<h2>解析結果</h2><p>" + result.join("</p><p>") + "</p>";

  showScreen("screen7");
}
</script>
  

</body>
</html>
