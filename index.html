<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>メール調査ナビ</title>

<style>
  body { font-family: sans-serif; text-align:center; padding:30px; }
  .screen { display:none; }
  .active { display:block; }

  button {
    font-size:18px;
    padding:12px 20px;
    margin:10px;
    cursor:pointer;
  }

  textarea {
    width:90%;
    height:200px;
  }

  .result {
    text-align:left;
    width:90%;
    margin:0 auto;
    white-space:pre-wrap;
  }
</style>
</head>

<body>

<!-- 画面1 -->
<div id="screen1" class="screen active">
  <h1>メール調査ナビ</h1>
  <p>スクショから調査を開始します</p>

  <button onclick="nextFlow()">📷 スクショを選ぶ</button>
</div>

<!-- 画面2 -->
<div id="screen2" class="screen">
  <h1>解析中...</h1>
  <p>メールを確認しています</p>
</div>

<!-- 画面3 -->
<div id="screen3" class="screen">
  <h1>アプリ判定</h1>
  <p>Gmailですか？</p>

  <button onclick="showScreen('screen4')">はい</button>
  <button onclick="showScreen('screen4')">いいえ</button>
</div>

<!-- 画面4 -->
<div id="screen4" class="screen">
  <h1>ヘッダー入力</h1>

  <p>ヘッダーを貼り付けてください</p>

  <textarea id="headerInput"></textarea>

  <br>

  <button onclick="analyzeHeader()">解析する</button>
</div>

<!-- 画面5 -->
<div id="screen5" class="screen">
  <h1>解析結果</h1>

  <div id="result" class="result"></div>

  <button onclick="showScreen('screen1')">最初に戻る</button>
</div>

<script>

/* 画面切替 */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

/* フロー */
function nextFlow(){
  showScreen('screen2');

  setTimeout(()=>{
    showScreen('screen3');
  }, 1500);
}

/* ★重要：強化パーサー */
function analyzeHeader(){

  const text = document.getElementById("headerInput").value.toLowerCase();

  let findings = [];

  /* SPF */
  const spfPass = /spf\s*=\s*pass/.test(text);
  const spfFail = /spf\s*=\s*fail/.test(text);

  if (spfFail) {
    findings.push("❌ SPF失敗（送信元が偽装の可能性）");
  } else if (!spfPass) {
    findings.push("⚠ SPF情報が見つかりません");
  }

  /* DKIM */
  const dkimPass = /dkim\s*=\s*pass/.test(text);
  const dkimNone = /dkim\s*=\s*none/.test(text);

  if (dkimNone) {
    findings.push("⚠ DKIMなし（署名未確認）");
  } else if (!dkimPass) {
    findings.push("⚠ DKIM情報が不明");
  }

  /* DMARC */
  const dmarcPass = /dmarc\s*=\s*pass/.test(text);
  const dmarcFail = /dmarc\s*=\s*fail/.test(text);

  if (dmarcFail) {
    findings.push("❌ DMARC失敗（なりすまし可能性高）");
  } else if (!dmarcPass) {
    findings.push("⚠ DMARC情報が見つかりません");
  }

  /* Reply-To */
  if (text.includes("reply-to")) {
    const match = text.match(/from:.*@(.+)\s/);
    const replyMatch = text.match(/reply-to:.*@(.+)\s/);

    if (match && replyMatch && match[1] !== replyMatch[1]) {
      findings.push("❌ Reply-Toと送信元ドメインが不一致");
    }
  }

  /* Received怪しさ */
  if (text.includes("unknown") || text.includes("ru") || text.includes("185.")) {
    findings.push("❌ 送信経路に不審なIP/ドメイン");
  }

  /* 結果なし対策 */
  if (findings.length === 0) {
    findings.push("ℹ 明確な不審点は検出されませんでした");
  }

  document.getElementById("result").innerHTML =
    "<h2>検出結果</h2><br>" + findings.join("<br>");

  showScreen("screen5");
}

</script>

</body>
</html>
